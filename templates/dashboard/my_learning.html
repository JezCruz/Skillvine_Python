{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Learning | Skillvine</title>
  <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
</head>
<body>
  <div class="dashboard-container">
    <aside class="sidebar">
      <h2 class="logo">Skillvine</h2>
      <nav class="sidebar-nav">
        <a href="{% url 'dashboard' %}">Dashboard</a>
        <a href="{% url 'profile' %}">Profile</a>
        <a href="{% url 'my_learning' %}" class="active">My Learning</a>
        <a href="{% url 'notifications' %}">Notifications</a>
        <a href="{% url 'settings' %}">Settings</a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="topbar">
        <h1>My Learning</h1>
        <p class="role-badge">Student</p>
      </div>

      <section class="dashboard-panel">
        <h2>Enrolled Classes</h2>

        <div class="lesson-grid">
          {% for item in learning_items %}
            <div class="lesson-card">
              <h3>{{ item.title }}</h3>
              <p><strong>Teacher:</strong> {{ item.teacher }}</p>
              <p><strong>Schedule:</strong> {{ item.schedule }}</p>
              <span class="lesson-status {{ item.status|lower }}">{{ item.status }}</span>
            </div>
          {% endfor %}
        </div>
      </section>
    </main>
  </div>
</body>
</html>
