{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Learning | Skillvine</title>
  <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
</head>
<body>
  <div class="dashboard-container">
    <aside class="sidebar">
      <h2 class="logo">Skillvine</h2>
      <nav class="sidebar-nav">
        <a href="{% url 'dashboard' %}">Dashboard</a>
        <a href="{% url 'profile' %}">Profile</a>
        <a href="{% url 'my_learning' %}" class="active">My Learning</a>
        <a href="{% url 'notifications' %}">Notifications</a>
        <a href="{% url 'settings' %}">Settings</a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="topbar">
        <h1>My Learning</h1>
        <p class="role-badge">Student</p>
      </div>

      <section class="dashboard-panel">
        <h2>Learning Page</h2>
        <p>
          This is the My Learning page. Later, we can add enrolled classes,
          ongoing sessions, completed lessons, and saved teachers here.
        </p>
      </section>
    </main>
  </div>
</body>
</html>
