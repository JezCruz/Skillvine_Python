{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lessons | Skillvine</title>
  <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
</head>
<body>
  <div class="dashboard-container">
    <aside class="sidebar">
      <h2 class="logo">Skillvine</h2>
      <nav class="sidebar-nav">
        <a href="{% url 'dashboard' %}">Dashboard</a>
        <a href="{% url 'profile' %}">Profile</a>
        <a href="{% url 'my_students' %}">My Students</a>
        <a href="{% url 'lessons' %}" class="active">Lessons</a>
        <a href="{% url 'notifications' %}">Notifications</a>
        <a href="{% url 'settings' %}">Settings</a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="topbar">
        <h1>Lessons</h1>
        <p class="role-badge">Teacher</p>
      </div>

      <section class="dashboard-panel">
        <h2>Created Lessons</h2>

        <div class="lesson-grid">
          {% for item in lesson_items %}
            <div class="lesson-card">
              <h3>{{ item.title }}</h3>
              <p><strong>Category:</strong> {{ item.category }}</p>
              <p><strong>Students:</strong> {{ item.students }}</p>
              <span class="lesson-status {{ item.status|lower }}">{{ item.status }}</span>
            </div>
          {% endfor %}
        </div>
      </section>
    </main>
  </div>
</body>
</html>
