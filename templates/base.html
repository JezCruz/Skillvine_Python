{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Skillvine{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
</head>
<body>
    <header>
      <nav class="navbar">
        <button type="button" class="menu-toggle">&#9776;</button>
        <div class="logo">
          <a href="{% url 'home' %}">Skillvine</a>
        </div>

        <ul class="nav-links">
          <li><a href="#" id="about-link">About</a></li>
          <li><a href="#" id="services-link">Services</a></li>
          <li><a href="#" id="contact-link">Contact</a></li>
        </ul>

        <a href="{% url 'login' %}" class="btn" id="nav-btn">Login</a>
      </nav>
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>

    <footer>
      <p>&copy; 2025 Skillvine. All rights reserved.</p>
    </footer>

    <script src="{% static 'js/script.js' %}"></script>
</body>
</html>
